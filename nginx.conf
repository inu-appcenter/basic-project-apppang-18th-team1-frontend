server {
    listen 443 ssl;
    server_name appang.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/appang.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appang.duckdns.org/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}